apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      imagePullSecrets:
      - name: swaraj-secret

      containers:
      - name: nginx
        image: testuserswaraj/nginx-demo-image:v1
        ports:
        - containerPort: 80


apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: websites.demo.com

spec:
  group: demo.com

  names:
    plural: websites
    singular: website
    kind: Website
    shortNames:
      - ws

  scope: Namespaced

  versions:
    - name: v1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
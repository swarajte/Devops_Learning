apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-probe-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: readiness-demo

  template:
    metadata:
      labels:
        app: readiness-demo

    spec:
      containers:
      - name: nginx
        image: nginx

        ports:
        - containerPort: 80

        readinessProbe:
          exec:
            command:
            - cat
            - /tmp/ready

          initialDelaySeconds: 5
          periodSeconds: 5

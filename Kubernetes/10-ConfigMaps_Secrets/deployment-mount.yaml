apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-mount

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-mount

  template:
    metadata:
      labels:
        app: nginx-mount

    spec:
      containers:
      - name: nginx
        image: nginx

        volumeMounts:
        - name: config-volume
          mountPath: /etc/config

      volumes:
      - name: config-volume
        configMap:
          name: app-config

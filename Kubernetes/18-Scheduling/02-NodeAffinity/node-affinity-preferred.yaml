apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-affinity-preferred

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: workload
                operator: In
                values:
                - frontend

      containers:
      - name: nginx
        image: nginx

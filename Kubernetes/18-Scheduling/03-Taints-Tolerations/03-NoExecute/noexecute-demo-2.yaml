apiVersion: apps/v1
kind: Deployment

metadata:
  name: noexecute-demo

spec:
  replicas: 3

  selector:
    matchLabels:
      app: noexecute

  template:
    metadata:
      labels:
        app: noexecute

    spec:
      nodeSelector:
        kubernetes.io/hostname: multinode-worker2

      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "database"
        effect: "NoExecute"
        tolerationSeconds: 30

      containers:
      - name: nginx
        image: nginx

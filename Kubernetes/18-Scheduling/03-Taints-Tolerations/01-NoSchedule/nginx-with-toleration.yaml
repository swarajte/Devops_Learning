apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-with-toleration

spec:
  replicas: 6

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "database"
        effect: "NoSchedule"

      containers:
      - name: nginx
        image: nginx
